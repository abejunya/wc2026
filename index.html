<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>W杯2026 予想ポイント順位表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
:root{--bg:#f8f9fa;--surface:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--green:#16a34a;--green-bg:#f0fdf4;--gold:#d97706;--gold-bg:#fffbeb;--blue:#2563eb;--blue-bg:#eff6ff;--red:#dc2626;--accent:#1d4ed8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;}
.header{background:#fff;border-bottom:2px solid #111827;padding:20px 24px 16px;}
.header-inner{max-width:1100px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.header-title{display:flex;align-items:baseline;gap:10px;}
.header-title h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,6vw,44px);letter-spacing:3px;color:#111827;line-height:1;}
.header-title .year{font-family:'Bebas Neue',sans-serif;font-size:clamp(16px,3vw,22px);color:var(--muted);letter-spacing:2px;}
.header-meta{font-size:12px;color:var(--muted);}
.header-meta strong{color:var(--text);}
.tabs{background:#fff;border-bottom:1px solid var(--border);}
.tabs-inner{max-width:1100px;margin:0 auto;display:flex;overflow-x:auto;}
.tab{padding:12px 18px;font-size:13px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.container{max-width:1100px;margin:0 auto;padding:24px 16px;}
.status-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid var(--border);background:#fff;}
.chip-green{background:var(--green-bg);border-color:#86efac;color:var(--green);}
.chip-gold{background:var(--gold-bg);border-color:#fcd34d;color:var(--gold);}
.chip-blue{background:var(--blue-bg);border-color:#93c5fd;color:var(--blue);}
.results-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--muted);margin-bottom:14px;}
.ranking-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.ranking-table thead tr{background:#f3f4f6;}
.ranking-table thead th{padding:10px 14px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-align:left;border-bottom:1px solid var(--border);}
.ranking-table thead th.right{text-align:right;}
.ranking-table tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
.ranking-table tbody tr:last-child{border-bottom:none;}
.ranking-table tbody tr:hover{background:#f9fafb;}
.ranking-table tbody tr.top3{background:var(--gold-bg);}
.ranking-table tbody td{padding:13px 14px;vertical-align:middle;}
.rank-cell{display:flex;align-items:center;gap:8px;}
.rank-num{font-family:'Bebas Neue',sans-serif;font-size:24px;width:44px;text-align:center;color:var(--muted);flex-shrink:0;}
.rank-medal{font-size:24px;width:44px;text-align:center;flex-shrink:0;}
.player-name{font-weight:700;font-size:14px;}
.champ-pick{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:3px;}
.ctag{font-weight:700;}.ctag.hit{color:var(--green);}
.pts-cell{text-align:right;}
.pts-big{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1;}
.pts-label{font-size:10px;color:var(--muted);letter-spacing:1px;}
.breakdown{display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap;margin-top:3px;}
.bd{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--bg);border:1px solid var(--border);color:var(--muted);}
.bd.pos{background:#dcfce7;border-color:#86efac;color:var(--green);}
.phase-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent);margin:20px 0 10px;padding-left:8px;border-left:4px solid var(--accent);}
.group-block{background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.group-header{padding:10px 14px;background:#f3f4f6;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.group-label{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--muted);flex-shrink:0;padding-top:2px;}
.group-standing{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:2px;}
.standing-row{display:flex;align-items:center;gap:4px;white-space:nowrap;}
.standing-rank{font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--muted);width:14px;flex-shrink:0;}
.standing-pts{font-size:10px;color:var(--muted);margin-left:2px;}
.match-row{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);gap:8px;}
.match-row:last-child{border-bottom:none;}
.match-datetime{font-size:10px;color:var(--muted);width:110px;flex-shrink:0;line-height:1.5;display:flex;flex-direction:row;align-items:flex-start;gap:4px;flex-wrap:nowrap;}
.match-teams{flex:1;display:flex;align-items:center;gap:6px;min-width:0;}
.team-a{text-align:right;flex:1;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:flex-end;gap:3px;min-width:0;}
.score-box{display:flex;gap:3px;align-items:center;flex-shrink:0;}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:17px;width:18px;text-align:center;line-height:1;}
.score-sep{color:var(--muted);font-size:11px;}
.team-b{flex:1;font-size:12px;font-weight:700;display:flex;align-items:center;gap:3px;min-width:0;}
.tn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.status-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;flex-shrink:0;min-width:34px;text-align:center;}
.badge-done{background:#f0fdf4;color:var(--green);border:1px solid #86efac;}
.badge-up{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.badge-tbd{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.flag{font-size:13px;line-height:1;flex-shrink:0;}
.picks-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.picks-table{border-collapse:collapse;background:#fff;border-radius:10px;border:1px solid var(--border);font-size:11px;}
.picks-table th,.picks-table td{border:1px solid var(--border);padding:5px 6px;text-align:center;}
.picks-table thead tr:first-child th{background:#e5e7eb;font-size:10px;font-weight:700;color:var(--muted);}
.picks-table thead tr:nth-child(2) th{background:#f3f4f6;font-size:10px;writing-mode:vertical-rl;height:70px;vertical-align:bottom;padding:4px 3px;}
.picks-table tbody tr:hover{background:#f9fafb;}
.picks-table .name-cell{text-align:left;font-weight:700;background:#fff;min-width:90px;position:sticky;left:0;z-index:1;}
.picks-table .pts-cell-sm{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--accent);background:#f9fafb;}
.mark-pick{color:var(--blue);font-weight:900;}
.champ-grid{display:flex;flex-direction:column;gap:12px;margin-top:14px;}
.champ-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:16px;}
.champ-card.hit{border-color:#fbbf24;background:#fffbeb;box-shadow:0 0 0 2px #fbbf24;}
.champ-flag{font-size:28px;line-height:1;flex-shrink:0;}
.champ-info{flex:1;min-width:0;}
.champ-team{font-weight:700;font-size:15px;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.champ-team.hit{color:var(--gold);}
.champ-names-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.champ-name-tag{font-size:12px;background:#f3f4f6;border-radius:20px;padding:2px 10px;color:var(--text);}
.champ-count{font-size:11px;color:var(--muted);margin-left:auto;flex-shrink:0;font-family:"Bebas Neue",sans-serif;font-size:20px;color:var(--accent);}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.note{margin-top:14px;font-size:11px;color:var(--muted);line-height:1.7;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:100;justify-content:center;align-items:center;flex-direction:column;gap:14px;}
.loading-overlay.show{display:flex;}
.loading-spin{width:38px;height:38px;border:3px solid #e5e7eb;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
.loading-text{font-size:14px;font-weight:700;color:var(--muted);}
.today-match{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden;}
.today-match-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#f3f4f6;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.today-dt-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.today-badge-wrap{display:flex;gap:4px;align-items:center;flex-shrink:0;}
.today-time{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);flex-shrink:0;}
.today-vs{display:flex;align-items:center;gap:10px;flex:1;justify-content:center;}
.today-team{font-weight:700;font-size:16px;display:flex;align-items:center;gap:6px;}
.today-score{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);padding:0 8px;}
.today-score.done{color:var(--accent);}
.today-badge-done{background:#f0fdf4;color:var(--green);border:1px solid #86efac;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.today-badge-up{background:#eff6ff;color:var(--blue);border:1px solid #93c5fd;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.today-body{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.today-pickers{background:#f8f9fa;border-radius:8px;padding:10px 12px;}
.today-pickers-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.today-pickers-names{display:flex;flex-wrap:wrap;gap:4px;}
.today-picker-tag{font-size:11px;background:#fff;border:1px solid var(--border);border-radius:20px;padding:2px 8px;color:var(--text);}
.today-picker-tag.champ{background:#fffbeb;border-color:#fcd34d;color:var(--gold);font-weight:700;}
.today-ai-comment{grid-column:1/-1;background:linear-gradient(135deg,#eff6ff 0%,#f0fdf4 100%);border:1px solid #93c5fd;border-radius:8px;padding:12px 14px;}
.today-ai-label{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:1.5px;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.today-ai-text{font-size:12px;line-height:1.7;color:var(--text);}

/* スマホ対応 */
@media (max-width: 600px){
  .today-match-header{flex-direction:column;align-items:center;gap:6px;text-align:center;}
  .today-dt-wrap{justify-content:center;}
  .today-vs{justify-content:center;width:100%;}
  .today-badge-wrap{justify-content:center;}
  .today-time{text-align:center;white-space:nowrap;}
  .today-body{grid-template-columns:1fr;}
  .today-team{font-size:14px;}
  .match-datetime{flex-direction:row;flex-wrap:wrap;}
}
</style>
</head>
<body>
<div class="loading-overlay" id="loading">
  <div class="loading-spin"></div>
  <div class="loading-text">最新の試合結果を取得中…</div>
</div>
<header class="header">
  <div class="header-inner">
    <div class="header-title"><h1>W杯2026</h1><span class="year">予想ポイント順位表</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="header-meta">更新: <strong id="lastUpdated">—</strong></div>

    </div>
  </div>
</header>
<div class="tabs"><div class="tabs-inner">
  <button class="tab active" onclick="switchTab('ranking')">🏆 順位表</button>
  <button class="tab" onclick="switchTab('schedule')">⚽ 日程・結果</button>
  <button class="tab" onclick="switchTab('allpicks')">📋 全員の予想</button>
  <button class="tab" onclick="switchTab('picks')">🔮 優勝予想</button>
</div></div>
<div class="container">
  <div class="tab-panel active" id="panel-ranking">
    <div class="section-title">現在の順位</div>
    <table class="ranking-table"><thead><tr>
      <th>順位 / 参加者</th><th class="right">内訳</th><th class="right" style="padding-right:18px">合計PT</th>
    </tr></thead><tbody id="rankingBody"></tbody></table>
    <div class="note">📋 <strong>ルール</strong><br>
      グループリーグ: 勝ち<strong>3pt</strong>・引き分け<strong>1pt</strong>・負け<strong>0pt</strong><br>
      決勝トーナメント: 勝ち<strong>3pt</strong>・負け<strong>0pt</strong><br>
      決勝トーナメントボーナス: 決勝出場<strong>+3pt</strong>・準優勝<strong>+4pt</strong>・優勝<strong>+5pt</strong>・3位<strong>+3pt</strong><br>
      ◎優勝予想的中で<strong>+5pt</strong>ボーナス。同点は同順位で表記。
    </div>
  </div>
  <div class="tab-panel" id="panel-schedule">
    <div style="display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border);overflow-x:auto">
      <button id="schtab-upcoming" onclick="switchSchTab('upcoming')" style="padding:8px 14px;font-size:12px;font-weight:700;color:var(--accent);background:none;border:none;border-bottom:3px solid var(--accent);cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap">今日・明日</button>
      <button id="schtab-past" onclick="switchSchTab('past')" style="padding:8px 14px;font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap">過去の試合</button>
      <button id="schtab-results" onclick="switchSchTab('results')" style="padding:8px 14px;font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap">試合結果</button>
    </div>
    <div id="schpanel-upcoming"><div id="upcomingSection"></div></div>
    <div id="schpanel-past" style="display:none"><div id="pastSection"></div></div>
    <div id="schpanel-results" style="display:none">
      <div class="results-meta" id="resultsMeta"></div>
      <div id="resultsSection"></div>
    </div>
  </div>
  <div class="tab-panel" id="panel-allpicks">
    <div style="display:flex;gap:0;margin-bottom:14px;border-bottom:2px solid var(--border);">
      <button class="subtab active" id="subtab-picks" onclick="switchSubtab('picks')" style="padding:8px 18px;font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;">予想一覧</button>
      <button class="subtab" id="subtab-teampts" onclick="switchSubtab('teampts')" style="padding:8px 18px;font-size:12px;font-weight:700;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;font-family:'Noto Sans JP',sans-serif;">各国ポイント</button>
    </div>
    <div id="subpanel-picks">
      <div class="picks-wrap"><table class="picks-table" id="allPicksTable"></table></div>
    </div>
    <div id="subpanel-teampts" style="display:none;">
      <div class="picks-wrap"><table class="picks-table" id="teamPtsTable"></table></div>
    </div>
  </div>
  <div class="tab-panel" id="panel-picks">
    <div class="section-title">優勝予想チーム別</div>
    <div class="champ-grid" id="picksGrid"></div>
  </div>
</div>

  {name:"鐙 雅也",champ:"アルゼンチン",picks:["メキシコ","スイス","ブラジル","モロッコ","アメリカ","ドイツ","オランダ","日本","ベルギー","スペイン","ウルグアイ","フランス","セネガル","アルゼンチン","ポルトガル","コロンビア","イングランド","クロアチア"]},

  {name:"加藤 卓",champ:"ブラジル",picks:["メキシコ","南アフリカ","ボスニア","カタール","ブラジル","パラグアイ","ドイツ","キュラソー","オランダ","日本","ベルギー","エジプト","スペイン","フランス","アルゼンチン","ウズベキスタン","イングランド","ガーナ"]},

let champion=null;
let lastUpdated=null;

function calcGroupStandings(){
  const r={};
  for(const[k,g]of Object.entries(GROUPS)){
    const p={};g.teams.forEach(t=>p[t]={pts:0,gd:0,gf:0});
    for(const m of g.matches){
      if(m.hs===null)continue;
      p[m.home].gf+=m.hs;p[m.home].gd+=m.hs-m.as;
      p[m.away].gf+=m.as;p[m.away].gd+=m.as-m.hs;
      if(m.hs>m.as)p[m.home].pts+=3;
      else if(m.hs===m.as){p[m.home].pts+=1;p[m.away].pts+=1;}
      else p[m.away].pts+=3;
    }
    r[k]=Object.entries(p).sort((a,b)=>b[1].pts-a[1].pts||b[1].gd-a[1].gd||b[1].gf-a[1].gf).map(([t])=>t);
  }
  return r;
}

function calcScore(p){
  const s=new Set(p.picks);let gl=0;
  for(const g of Object.values(GROUPS))for(const m of g.matches){
    if(m.hs===null)continue;
    if(s.has(m.home)){if(m.hs>m.as)gl+=3;else if(m.hs===m.as)gl+=1;}
    if(s.has(m.away)){if(m.as>m.hs)gl+=3;else if(m.hs===m.as)gl+=1;}
  }
  const b=(champion&&champion===p.champ)?5:0;
  return{gl,bonus:b,total:gl+b};
}

function calcTeamPts(grpKey, team){
  let pts=0;
  for(const m of GROUPS[grpKey].matches){
    if(m.hs===null)continue;
    if(m.home===team){if(m.hs>m.as)pts+=3;else if(m.hs===m.as)pts+=1;}
    if(m.away===team){if(m.as>m.hs)pts+=3;else if(m.hs===m.as)pts+=1;}
  }
  return pts;
}

function renderRanking(){
  const sc=PARTICIPANTS.map(p=>({...p,...calcScore(p)})).sort((a,b)=>b.total-a.total);
  const medals=['🥇','🥈','🥉'];
  let rank=1,rows=[];
  for(let i=0;i<sc.length;){
    let j=i;while(j<sc.length&&sc[j].total===sc[i].total)j++;
    const tie=j-i>1;
    for(let k=i;k<j;k++){
      const s=sc[k];const hit=champion&&champion===s.champ;const isTop=rank<=3;
      rows.push(`<tr class="${isTop?'top3':''}">
        <td><div class="rank-cell">
          <div class="${isTop&&!tie?'rank-medal':'rank-num'}">${isTop&&!tie?medals[rank-1]:(tie?`${rank}T`:rank)}</div>
          <div><div class="player-name">${s.name}</div>
          <div class="champ-pick">◎ <span class="flag">${F(s.champ)}</span><span class="ctag ${hit?'hit':''}">${s.champ}${hit?' ✓':''}</span></div></div>
        </div></td>
        <td class="pts-cell"><div class="breakdown"><span class="bd">GL:${s.gl}pt</span>${s.bonus?`<span class="bd pos">優勝+${s.bonus}</span>`:''}</div></td>
        <td class="pts-cell"><div class="pts-big">${s.total}</div><div class="pts-label">PTS</div></td>
      </tr>`);
    }
    rank+=j-i;i=j;
  }
  document.getElementById('rankingBody').innerHTML=rows.join('');
}

function renderResults(){
  const st=calcGroupStandings();
  // 完了試合チップを試合結果タブに表示
  let done=0,total=0;
  for(const g of Object.values(GROUPS))for(const m of g.matches){total++;if(m.hs!==null)done++;}
  document.getElementById('resultsMeta').innerHTML=
    `<div class="chip chip-blue">⚽ 完了試合 <strong>${done}/${total}</strong></div>`+
    (champion?`<div class="chip chip-gold">🏆 <strong>${F(champion)}${champion}</strong></div>`:'');

  let html='<div class="phase-title">グループステージ</div>';
  for(const[k,g]of Object.entries(GROUPS)){
    const order=st[k]||g.teams;
    // 順位を1チームずつ改行で表示
    const sRows=order.map((t,i)=>{
      const pts=st[k]?calcTeamPts(k,t):null;

  document.getElementById('resultsSection').innerHTML=html;
}

  const sc=PARTICIPANTS.map(p=>({...p,...calcScore(p)}));
  let th=`<thead><tr><th class="name-cell" rowspan="2" style="position:sticky;left:0;background:#e5e7eb;z-index:2">参加者</th>

    <td class="name-cell" style="position:sticky;left:0;background:#fff;z-index:1">${p.name}</td>
    ${all.map(({team,group},i)=>{const bl=i>0&&all[i-1].group!==all[i].group?'border-left:2px solid #d1d5db;':'';

async function fetchLatest(){
  const btn=document.getElementById('fetchBtn');
  btn.disabled=true;btn.textContent='取得中…';
  document.getElementById('loading').classList.add('show');
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:`今日は2026年6月18日。W杯2026の最新グループリーグ・決勝トーナメント試合結果を検索してください。以下の既知結果以降の新しい確定結果のみ教えてください。
既知: メキシコ2-0南アフリカ, 韓国2-1チェコ, カナダ1-1ボスニア, アメリカ4-1パラグアイ, カタール1-1スイス, ブラジル1-1モロッコ, ハイチ0-1スコットランド, オーストラリア2-0トルコ, ドイツ7-1キュラソー, コートジボワール1-0エクアドル, スウェーデン5-1チュニジア, オランダ2-2日本, ベルギー1-1エジプト, スペイン0-0カボベルデ, サウジアラビア1-1ウルグアイ, フランス3-1セネガル, イラク1-4ノルウェー, アルゼンチン3-0アルジェリア, オーストリア3-1ヨルダン, ポルトガル1-1コンゴ, イラン2-2ニュージーランド, イングランド4-2クロアチア
JSONのみ返してください: {"matches":[{"group":"A","home":"チーム","away":"チーム","homeScore":数値,"awayScore":数値}],"champion":null,"summary":"サマリー"}`}]})
    });
    const data=await res.json();
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    let parsed=null;
    try{const m=text.match(/\{[\s\S]*\}/);if(m)parsed=JSON.parse(m[0]);}catch(e){}
    if(parsed&&parsed.matches){
      for(const r of parsed.matches){
        const g=GROUPS[r.group];if(!g)continue;
        const m=g.matches.find(m=>m.home===r.home&&m.away===r.away);
        if(m&&r.homeScore!==null){m.hs=r.homeScore;m.as=r.awayScore;}
      }
      if(parsed.champion)champion=parsed.champion;
      lastUpdated=new Date().toLocaleString('ja-JP')+(parsed.summary?` — ${parsed.summary}`:'');
    }else{
      lastUpdated=new Date().toLocaleString('ja-JP');
    }
  }catch(e){lastUpdated=new Date().toLocaleString('ja-JP')+' ⚠️';}
  btn.disabled=false;btn.textContent='⟳ 結果を更新';
  document.getElementById('loading').classList.remove('show');
  document.getElementById('lastUpdated').textContent=lastUpdated;
  renderAll();
}

function renderTeamPts(){
  // 各国の現在ポイントを計算
  const teamPts={};
  for(const g of Object.values(GROUPS)){
    for(const m of g.matches){
      if(m.hs===null)continue;
      if(!teamPts[m.home])teamPts[m.home]=0;
      if(!teamPts[m.away])teamPts[m.away]=0;
      if(m.hs>m.as){teamPts[m.home]+=3;}
      else if(m.hs===m.as){teamPts[m.home]+=1;teamPts[m.away]+=1;}
      else{teamPts[m.away]+=3;}
    }
  }
  const gEntries=Object.entries(GROUPS);
  const allTeams=[];
  gEntries.forEach(([k,g])=>g.teams.forEach(t=>allTeams.push({team:t,group:k})));
  const scores=PARTICIPANTS.map(p=>({...p,...calcScore(p)}));

  let thead=`<thead><tr>
    <th class="name-cell" rowspan="2" style="position:sticky;left:0;background:#e5e7eb;z-index:2">参加者</th>
    ${gEntries.map(([k,g])=>`<th colspan="${g.teams.length}" style="border-left:2px solid #d1d5db">G-${k}</th>`).join('')}
    <th rowspan="2" style="background:#dbeafe;color:var(--blue)">合計</th></tr><tr>
    ${allTeams.map(({team},i)=>{const bl=i>0&&allTeams[i-1].group!==allTeams[i].group?'border-left:2px solid #d1d5db;':'';return`<th style="${bl}">${team}</th>`;}).join('')}
  </tr></thead>`;

  const tbody='<tbody>'+scores.map(p=>{
    const set=new Set(p.picks);
    return`<tr>
      <td class="name-cell" style="position:sticky;left:0;background:#fff;z-index:1">${p.name}</td>
      ${allTeams.map(({team,group},i)=>{
        const bl=i>0&&allTeams[i-1].group!==allTeams[i].group?'border-left:2px solid #d1d5db;':'';
        const pts=teamPts[team]??0;
        const isChamp=team===p.champ;
        const isPick=set.has(team);
        if(isChamp){
          // 優勝予想：bold ゴールド数字
          return`<td style="${bl}text-align:center"><span style="font-weight:700;color:#d97706;font-size:12px">${pts}</span></td>`;
        } else if(isPick){
          // 選択チーム：bold 青数字（青丸→bold青数字に）
          return`<td style="${bl}text-align:center"><span style="font-weight:700;color:var(--blue);font-size:12px">${pts}</span></td>`;
        } else {
          // 未選択：グレー数字
          return`<td style="${bl}text-align:center"><span style="color:#d1d5db;font-size:11px">${pts}</span></td>`;
        }
      }).join('')}
      <td class="pts-cell-sm">${p.total}</td>
    </tr>`;
  }).join('')+'</tbody>';
  document.getElementById('teamPtsTable').innerHTML=thead+tbody;
}

function jstDateStr(offsetDays){
  const now = new Date();
  const j = new Date(now.getTime() + (9*60*60*1000) + (offsetDays||0)*24*60*60*1000);
  return (j.getUTCMonth()+1) + '/' + j.getUTCDate();
}

function matchDateStr(dt){
  const dtDate = dt.split('|')[0];
  const slash = dtDate.indexOf('/');
  const paren = dtDate.indexOf('(');
  const mm = dtDate.substring(0, slash);
  const dd = paren > 0 ? dtDate.substring(slash+1, paren) : dtDate.substring(slash+1);
  return mm + '/' + dd;
}

function buildMatchCard(m, opts){
  opts = opts || {};
  const done = m.hs !== null;
  const time = m.dt.includes('|') ? m.dt.split('|')[1] : m.dt;
  const dtDate = m.dt.split('|')[0];
  const ai = getAIComments()[m.home+'_'+m.away] || '';
  const tvHtml = {'NHK':'<span style="background:#003087;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px">NHK</span>','NTV':'<span style="background:#cc0000;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px">日テレ</span>','CX':'<span style="background:#3a75c4;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px">フジ</span>'}[m.tv]||'';

  // 両取りチェック用
  const bothNote = (name, picks) => {
    const hasHome = new Set(picks).has(m.home);
    const hasAway = new Set(picks).has(m.away);
    return hasHome && hasAway;
  };

  const homePickers = PARTICIPANTS.filter(p=>new Set(p.picks).has(m.home)&&p.champ!==m.home);
  const homeChamp   = PARTICIPANTS.filter(p=>p.champ===m.home);
  const awayPickers = PARTICIPANTS.filter(p=>new Set(p.picks).has(m.away)&&p.champ!==m.away);
  const awayChamp   = PARTICIPANTS.filter(p=>p.champ===m.away);

  const tag = (p, team) => {
    const b = new Set(p.picks).has(m.home) && new Set(p.picks).has(m.away);
    const isChamp = p.champ === team;
    return `<span class="today-picker-tag${isChamp?' champ':''}">${isChamp?'🏆':''}${p.name}${b?' <span style="color:#9333ea;font-size:9px">両取り</span>':''}</span>`;
  };
  const pickerTags = (pickers, champs, team) =>
    [...champs.map(p=>tag(p,team)), ...pickers.map(p=>tag(p,team))].join('') || '<span style="color:var(--muted);font-size:11px">なし</span>';

  const headerBg = opts.past ? 'background:#f8f9fa' : '';
  const scoreSize = opts.past ? 'font-size:22px' : '';
  const flagSize = opts.past ? '16px' : '20px';
  const dtLabel = opts.past ? `${dtDate} ${time}` : `${time} JST`;

  let card = `<div class="today-match">
    <div class="today-match-header" style="${headerBg}">
      <div class="today-dt-wrap">
        <span class="today-time">${dtLabel}</span>${tvHtml}
      </div>
      <div class="today-vs">
        <span class="today-team"><span style="font-size:${flagSize}">${F(m.home)}</span>${m.home}</span>
        <span class="today-score ${done?'done':''}" style="${scoreSize}"> ${done?m.hs:'－'} : ${done?m.as:'－'} </span>
        <span class="today-team">${m.away}<span style="font-size:${flagSize}">${F(m.away)}</span></span>
      </div>
      <div class="today-badge-wrap"><span class="today-badge-${done?'done':'up'}">${done?'終了':'予定'}</span></div>
    </div>`;

  // 今日明日・過去ともに予想メンバー＋AIコメントを表示
  card += `<div class="today-body">
      <div class="today-pickers">
        <div class="today-pickers-title"><span style="font-size:14px">${F(m.home)}</span>${m.home}を選んでいる人</div>
        <div class="today-pickers-names">${pickerTags(homePickers,homeChamp,m.home)}</div>
      </div>
      <div class="today-pickers">
        <div class="today-pickers-title"><span style="font-size:14px">${F(m.away)}</span>${m.away}を選んでいる人</div>
        <div class="today-pickers-names">${pickerTags(awayPickers,awayChamp,m.away)}</div>
      </div>
      ${ai?`<div class="today-ai-comment"><div class="today-ai-label">🤖 AIコメント</div><div class="today-ai-text">${ai}</div></div>`:''}
    </div>`;
  card += '</div>';
  return card;
}

function getMatchesByDate(dateStr){
  const arr = [];
  for(const[grpKey,g] of Object.entries(GROUPS)){
    for(const m of g.matches){
      if(matchDateStr(m.dt) === dateStr) arr.push({...m, group:grpKey});
    }
  }
  arr.sort((a,b)=>(a.dt.split('|')[1]||'').localeCompare(b.dt.split('|')[1]||''));
  return arr;
}

function renderUpcoming(){
  const todayStr = jstDateStr(0);
  const tomorrowStr = jstDateStr(1);
  const today = getMatchesByDate(todayStr);
  const tomorrow = getMatchesByDate(tomorrowStr);

  let html = '';
  const section = (label, matches, isToday) => {
    if(matches.length === 0) return '';
    let s = `<div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:${isToday?'var(--accent)':'var(--muted)'};margin:6px 0 10px;padding-left:8px;border-left:4px solid ${isToday?'var(--accent)':'var(--border)'}">${label}</div>`;
    for(const m of matches) s += buildMatchCard(m, {past:false});
    return s;
  };
  html += section('📅 今日の試合 ('+todayStr+')', today, true);
  html += section('🌅 明日の試合 ('+tomorrowStr+')', tomorrow, false);
  if(!html) html = '<div style="text-align:center;padding:40px;color:var(--muted)">今日・明日の試合はありません</div>';
  document.getElementById('upcomingSection').innerHTML = html;
}

function renderPast(){
  const todayStr = jstDateStr(0);
  const past = [];
  for(const[grpKey,g] of Object.entries(GROUPS)){
    for(const m of g.matches){
      if(m.hs !== null && matchDateStr(m.dt) !== todayStr){
        past.push({...m, group:grpKey});
      }
    }
  }
  past.sort((a,b)=>b.dt.localeCompare(a.dt));
  let html = '';
  for(const m of past) html += buildMatchCard(m, {past:true});
  if(!html) html = '<div style="text-align:center;padding:40px;color:var(--muted)">過去の試合はありません</div>';
  document.getElementById('pastSection').innerHTML = html;
}

// 初期表示
renderAll();
document.getElementById('lastUpdated').textContent=new Date().toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})+'更新';
</script>
